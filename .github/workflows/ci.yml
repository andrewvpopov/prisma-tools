# Shared-package CI — BWK-92 reference workflow.
#
# This is the plain-JS variant (no build step). TS packages that compile to a
# committed dist/ add a `build` + dist-dirty-diff check before verify:pack —
# see STANDARDS.md. Copy this file into each shared package repo and adjust the
# require-smoke only if a consumer needs it.
name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  # Single job named `test` so it stays the stable required status check for
  # branch protection. Runs the engines floor (Node 20); this package has no
  # version-specific behavior, so passing on the floor covers newer consumers. If
  # a package ever needs a real version matrix, add a `ci-success` aggregation job
  # (needs: [test]) and require THAT — a matrix renames `test` to `test (20)` and
  # silently breaks a required context of `test`.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Consumer-side pack + install smoke
        run: npm run verify:pack

  # Tags are the shipped artifact (consumers install github:...#vX.Y.Z), so gate
  # them: the tag must match package.json version and have a CHANGELOG entry.
  release-guard:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert tag matches package.json version and CHANGELOG
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"; exit 1
          fi
          if ! grep -q "^## $TAG\b" CHANGELOG.md; then
            echo "::error::no CHANGELOG.md entry for $TAG"; exit 1
          fi
