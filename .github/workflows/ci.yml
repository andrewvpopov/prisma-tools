# Shared-package CI — BWK-92 reference workflow.
#
# This is the plain-JS variant (no build step). TS packages that compile to a
# committed dist/ add a `build` + dist-dirty-diff check before verify:pack —
# see STANDARDS.md. Copy this file into each shared package repo and adjust the
# require-smoke only if a consumer needs it.
name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  # Single job named `test` so it stays the stable required status check for
  # branch protection. Runs the engines floor (Node 20). The OS/Node compat
  # matrix lives in a SEPARATE `compat` job (below) so this required context name
  # never changes — a matrix would rename `test` to `test (20)` and silently
  # break a required context of `test`. Promote `ci-success` to the required
  # check (and drop `test`) if/when you want the matrix gating merges (see H in
  # the maturation plan — this is advisory until branch protection is updated).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Type contract (src/index.d.ts vs a consumer snippet)
        run: npm run verify:types
      - name: Consumer-side pack + install smoke
        run: npm run verify:pack

  # Non-required forward/cross-platform-compat matrix. Exercises the win32
  # `.cmd` branches in resolvePrismaBin (via runCli's `platform` DI seam) on a
  # real Windows runner, plus newer Node versions on Linux. Kept out of the
  # `test` context name on purpose (see above).
  compat:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: ['20', '22', '24']
        include:
          # One Windows leg (not a full os x node cross product) to exercise the
          # win32 `.cmd` branches in resolvePrismaBin without tripling CI cost.
          - os: windows-latest
            node-version: '20'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test
      - run: npm run verify:types

  # Aggregation gate: green only if `test` and every `compat` leg passed. Make
  # THIS the required status check to gate merges on the full matrix.
  ci-success:
    if: always()
    needs: [test, compat]
    runs-on: ubuntu-latest
    steps:
      - name: Assert all upstream jobs succeeded
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.compat.result }}" != "success" ]; then
            echo "::error::a required CI job failed (test=${{ needs.test.result }} compat=${{ needs.compat.result }})"
            exit 1
          fi
          echo "all CI jobs green"

  # Tags are the shipped artifact (consumers install github:...#vX.Y.Z), so gate
  # them: the tag must match package.json version and have a CHANGELOG entry.
  release-guard:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert tag matches package.json version and CHANGELOG
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"; exit 1
          fi
          if ! grep -q "^## $TAG\b" CHANGELOG.md; then
            echo "::error::no CHANGELOG.md entry for $TAG"; exit 1
          fi
